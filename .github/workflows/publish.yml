name: Publish prebuilt binaries

on: workflow_dispatch

jobs:
  publish_linux:
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@v6
    - name: Use Node.js 24.x
      uses: actions/setup-node@v6
      with:
        node-version: 24.x
    - name: Install system deps
      run: sudo apt-get install -y build-essential autoconf autoconf-archive automake libtool ninja-build
    - name: Get vcpkg baseline
      id: baseline
      run: echo "value=$(node -p "require('./vcpkg.json')['builtin-baseline']")" >> "$GITHUB_OUTPUT"
    - name: Setup vcpkg
      uses: lukka/run-vcpkg@v11
      with:
        vcpkgGitCommitId: ${{ steps.baseline.outputs.value }}
    - run: npm install --ignore-scripts
    - name: Build
      run: npx cmake-js compile -j max --CDCMAKE_TOOLCHAIN_FILE="$VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake"
    - run: npm test
    - name: Package binary
      run: |
        PLATFORM=$(node -p "process.platform")
        ARCH=$(node -p "process.arch")
        BINDING_DIR="lib/binding/${PLATFORM}-${ARCH}"
        TARBALL="${PLATFORM}-${ARCH}.tar.gz"
        tar -czf "$TARBALL" -C "$BINDING_DIR" .
        mkdir -p build/stage
        mv "$TARBALL" build/stage/
        echo "Packaged: build/stage/$TARBALL"
    - name: Publish to GitHub Release
      run: |
        VERSION=$(node -p "require('./package.json').version")
        gh release upload "v$VERSION" build/stage/*.tar.gz --clobber
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish_macos:
    runs-on: macos-15
    steps:
    - uses: actions/checkout@v6
    - name: Use Node.js 24.x
      uses: actions/setup-node@v6
      with:
        node-version: 24.x
    - name: Install system deps
      run: brew install autoconf automake libtool ninja
    - name: Get vcpkg baseline
      id: baseline
      run: echo "value=$(node -p "require('./vcpkg.json')['builtin-baseline']")" >> "$GITHUB_OUTPUT"
    - name: Setup vcpkg
      uses: lukka/run-vcpkg@v11
      with:
        vcpkgGitCommitId: ${{ steps.baseline.outputs.value }}
    - run: npm install --ignore-scripts
    - name: Build
      run: npx cmake-js compile -j max --CDCMAKE_TOOLCHAIN_FILE="$VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake"
    - run: npm test
    - name: Package binary
      run: |
        PLATFORM=$(node -p "process.platform")
        ARCH=$(node -p "process.arch")
        BINDING_DIR="lib/binding/${PLATFORM}-${ARCH}"
        TARBALL="${PLATFORM}-${ARCH}.tar.gz"
        tar -czf "$TARBALL" -C "$BINDING_DIR" .
        mkdir -p build/stage
        mv "$TARBALL" build/stage/
        echo "Packaged: build/stage/$TARBALL"
    - name: Publish to GitHub Release
      run: |
        VERSION=$(node -p "require('./package.json').version")
        gh release upload "v$VERSION" build/stage/*.tar.gz --clobber
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish_windows:
    runs-on: windows-2022
    steps:
    - uses: actions/checkout@v6
    - name: Use Node.js 24.x
      uses: actions/setup-node@v6
      with:
        node-version: 24.x
    - name: Get vcpkg baseline
      id: baseline
      shell: pwsh
      run: |
        $v = (node -p "require('./vcpkg.json')['builtin-baseline']")
        "value=$v" >> $env:GITHUB_OUTPUT
    - name: Setup vcpkg
      uses: lukka/run-vcpkg@v11
      with:
        vcpkgGitCommitId: ${{ steps.baseline.outputs.value }}
    - run: npm install --ignore-scripts
    - name: Build
      shell: pwsh
      run: npx cmake-js compile -j max --CDCMAKE_TOOLCHAIN_FILE="$env:VCPKG_ROOT\scripts\buildsystems\vcpkg.cmake"
    - run: npm test
    - name: Package binary
      shell: bash
      run: |
        PLATFORM=$(node -p "process.platform")
        ARCH=$(node -p "process.arch")
        BINDING_DIR="lib/binding/${PLATFORM}-${ARCH}"
        TARBALL="${PLATFORM}-${ARCH}.tar.gz"
        tar -czf "$TARBALL" -C "$BINDING_DIR" .
        mkdir -p build/stage
        mv "$TARBALL" build/stage/
        echo "Packaged: build/stage/$TARBALL"
    - name: Publish to GitHub Release
      shell: pwsh
      run: |
        $VERSION = (node -p "require('./package.json').version")
        gh release upload "v$VERSION" build/stage/*.tar.gz --clobber
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

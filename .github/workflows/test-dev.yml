# This workflow will do a clean install of node dependencies, build the source code and run tests across different versions of node
# For more information see: https://help.github.com/actions/language-and-framework-guides/using-nodejs-with-github-actions

name: Node.js CI

on:
  push:
    branches: [ main ]
    paths-ignore:
      '*.md'
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      testNetwork:
        description: 'Run tests that require network connectivity'
        required: false
        default: '0'

jobs:
  bundled_gdal_coverage:

    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v6
    - name: Use Node.js 20.x
      uses: actions/setup-node@v6
      with:
        node-version: 20.x
    - name: ccache
      uses: hendrikmuhs/ccache-action@v1.2
      with:
        max-size: 1000M
        key: coverage
    - name: Restore vcpkg cache
      uses: actions/cache@v4
      with:
        path: vcpkg_installed
        key: vcpkg-${{ runner.os }}-${{ hashFiles('vcpkg.json') }}
        restore-keys: vcpkg-${{ runner.os }}-
    - name: Setup vcpkg
      run: |
        if [ ! -d vcpkg ]; then
          git clone --depth 1 https://github.com/microsoft/vcpkg.git
          ./vcpkg/bootstrap-vcpkg.sh
        fi
        echo "VCPKG_ROOT=$(pwd)/vcpkg" >> $GITHUB_ENV
    - name: Install vcpkg dependencies
      run: ./vcpkg/vcpkg install
    - run: npm install --ignore-scripts
    - name: Build from sources
      run: npx cmake-js compile --debug --CDENABLE_COVERAGE=ON -j max
      env:
        CXX: ccache g++
        CC: ccache gcc
        CMAKE_TOOLCHAIN_FILE: ${{ env.VCPKG_ROOT }}/scripts/buildsystems/vcpkg.cmake
    - name: Run unit tests
      run: npx c8 npm test
      env:
        MOCHA_TEST_NETWORK: 1
    - name: Collect code coverage
      run: |
        npm run gcov
        npm run lcov
    - run: npm run codecov
      env:
        CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}


  test_distros_shared:

    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        linux-version:
          - ubuntu:22.04
          - ubuntu:24.04
          - debian:bullseye
          - fedora:42
          # CentOS is disabled because of
          # https://bugzilla.redhat.com/show_bug.cgi?id=2376350
          # - centos:stream10

    steps:
    - uses: actions/checkout@v6
    - name: Use Node.js 20.x
      uses: actions/setup-node@v6
      with:
        node-version: 20.x
    - name: ccache
      uses: hendrikmuhs/ccache-action@v1.2
      with:
        max-size: 1000M
        key: distros-shared-${{ matrix.linux-version }}
    - run: npm run container dev ${{ matrix.linux-version }} 20 shared
      env:
        MOCHA_TEST_NETWORK: ${{ github.event.inputs.testNetwork }}


  test_distros_bundled:

    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        linux-version: [ 'amazonlinux:2023', 'ubuntu:24.04' ]

    steps:
    - uses: actions/checkout@v6
    - name: Use Node.js 20.x
      uses: actions/setup-node@v6
      with:
        node-version: 20.x
    - name: ccache
      uses: hendrikmuhs/ccache-action@v1.2
      with:
        max-size: 1000M
        key: distros-bundled-${{ matrix.linux-version }}
    - run: npm run container dev ${{ matrix.linux-version }} 22 bundled
      env:
        MOCHA_TEST_NETWORK: ${{ github.event.inputs.testNetwork }}


  test_node_old:

    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        node-version: [ 20, 22, 24 ]
        gdal-version: [ 'shared', 'bundled' ]

    steps:
    - uses: actions/checkout@v6
    - name: Use Node.js 20.x
      uses: actions/setup-node@v6
      with:
        node-version: 20.x
    - name: ccache
      uses: hendrikmuhs/ccache-action@v1.2
      with:
        max-size: 1000M
        key: node-${{ matrix.node-version }}
    - run: npm run container dev debian:bullseye ${{ matrix.node-version }} ${{ matrix.gdal-version }}
      env:
        MOCHA_TEST_NETWORK: ${{ github.event.inputs.testNetwork }}


  test_node_new:

    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        node-version: [ 25 ]
        gdal-version: [ 'shared', 'bundled' ]

    steps:
    - uses: actions/checkout@v6
    - name: Use Node.js 20.x
      uses: actions/setup-node@v6
      with:
        node-version: 20.x
    - name: ccache
      uses: hendrikmuhs/ccache-action@v1.2
      with:
        max-size: 1000M
        key: node-${{ matrix.node-version }}
    - run: npm run container dev debian:trixie ${{ matrix.node-version }} ${{ matrix.gdal-version }}
      env:
        MOCHA_TEST_NETWORK: ${{ github.event.inputs.testNetwork }}


  test_asan:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6
    - name: Use Node.js 20.x
      uses: actions/setup-node@v6
      with:
        node-version: 20.x
    - name: ccache
      uses: hendrikmuhs/ccache-action@v1.2
      with:
        max-size: 1000M
        key: asan
    - run: npm run container asan ubuntu:22.04 24 bundled
      env:
        MOCHA_TEST_NETWORK: ${{ github.event.inputs.testNetwork }}


  test_mac:

    runs-on: ${{ matrix.mac-version }}

    strategy:
      fail-fast: false
      matrix:
        mac-version: [ macos-15-intel, macos-15 ]
        node-version: [ 20.x, 22.x, 24.x, 25.x ]

    steps:
    - uses: actions/checkout@v6
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v6
      with:
        node-version: ${{ matrix.node-version }}
    - uses: actions/setup-python@v6
      with:
        python-version: "3.11"
    - name: ccache
      uses: hendrikmuhs/ccache-action@v1.2
      with:
        max-size: 1000M
        key: mac-${{ matrix.node-version }}
    - name: Restore vcpkg cache
      uses: actions/cache@v4
      with:
        path: vcpkg_installed
        key: vcpkg-${{ runner.os }}-${{ hashFiles('vcpkg.json') }}
        restore-keys: vcpkg-${{ runner.os }}-
    - name: Setup vcpkg
      run: |
        if [ ! -d vcpkg ]; then
          git clone --depth 1 https://github.com/microsoft/vcpkg.git
          ./vcpkg/bootstrap-vcpkg.sh
        fi
        echo "VCPKG_ROOT=$(pwd)/vcpkg" >> $GITHUB_ENV
    - name: Install vcpkg dependencies
      run: ./vcpkg/vcpkg install
    - run: npm install --ignore-scripts
    - name: Build from sources
      run: npx cmake-js compile -j max
      env:
        CXX: ccache g++
        CC: ccache gcc
        CXXFLAGS: -DDEBUG_MACOS_FREEZE
        CMAKE_TOOLCHAIN_FILE: ${{ env.VCPKG_ROOT }}/scripts/buildsystems/vcpkg.cmake
    - name: Run unit tests
      run: npm test
      env:
        MOCHA_TEST_NETWORK: ${{ github.event.inputs.testNetwork }}

  test_mac_debug:

    runs-on: macos-15

    steps:
    - uses: actions/checkout@v6
    - name: Use Node.js 20.x
      uses: actions/setup-node@v6
      with:
        node-version: 20.x
    - uses: actions/setup-python@v6
      with:
        python-version: "3.11"
    - name: ccache
      uses: hendrikmuhs/ccache-action@v1.2
      with:
        max-size: 1000M
        key: mac-debug
    - name: Setup vcpkg
      run: |
        if [ ! -d vcpkg ]; then
          git clone --depth 1 https://github.com/microsoft/vcpkg.git
          ./vcpkg/bootstrap-vcpkg.sh
        fi
        echo "VCPKG_ROOT=$(pwd)/vcpkg" >> $GITHUB_ENV
    - name: Install vcpkg dependencies
      run: ./vcpkg/vcpkg install
    - run: npm install --ignore-scripts
    - name: Build from sources
      run: npx cmake-js compile --debug -j max
      env:
        CXX: ccache g++
        CC: ccache gcc
        CXXFLAGS: -DDEBUG_MACOS_FREEZE
        CMAKE_TOOLCHAIN_FILE: ${{ env.VCPKG_ROOT }}/scripts/buildsystems/vcpkg.cmake
    - name: Run unit tests
      run: npm test
      env:
        MOCHA_TEST_NETWORK: ${{ github.event.inputs.testNetwork }}

  test_win:

    runs-on: windows-2022

    strategy:
      fail-fast: false
      matrix:
        node-version: [ 20.x, 22.x, 24.x, 25.x ]

    steps:
    - uses: actions/checkout@v6
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v6
      with:
        node-version: ${{ matrix.node-version }}
    - name: Restore vcpkg cache
      uses: actions/cache@v4
      with:
        path: vcpkg_installed
        key: vcpkg-${{ runner.os }}-${{ hashFiles('vcpkg.json') }}
        restore-keys: vcpkg-${{ runner.os }}-
    - name: Setup vcpkg
      run: |
        if (-not (Test-Path vcpkg)) {
          git clone --depth 1 https://github.com/microsoft/vcpkg.git
          .\vcpkg\bootstrap-vcpkg.bat
        }
        echo "VCPKG_ROOT=$PWD\vcpkg" >> $env:GITHUB_ENV
    - name: Install vcpkg dependencies
      run: .\vcpkg\vcpkg install
    - run: npm install --ignore-scripts
    - name: Build from sources
      run: npx cmake-js compile -j max
    - name: Run unit tests
      run: npm test
      env:
        MOCHA_TEST_NETWORK: ${{ github.event.inputs.testNetwork }}

  test_win_debug:

    runs-on: windows-2022

    steps:
    - uses: actions/checkout@v6
    - name: Use Node.js 20.x
      uses: actions/setup-node@v6
      with:
        node-version: 20.x
    - name: Setup vcpkg
      run: |
        if (-not (Test-Path vcpkg)) {
          git clone --depth 1 https://github.com/microsoft/vcpkg.git
          .\vcpkg\bootstrap-vcpkg.bat
        }
        echo "VCPKG_ROOT=$PWD\vcpkg" >> $env:GITHUB_ENV
    - name: Install vcpkg dependencies
      run: .\vcpkg\vcpkg install
    - run: npm install --ignore-scripts
    - name: Build from sources
      run: npx cmake-js compile --debug -j max
    - name: Run unit tests
      run: npm test
      env:
        MOCHA_TEST_NETWORK: ${{ github.event.inputs.testNetwork }}

name: Node.js CI

on:
  push:
    branches: [ main ]
    paths-ignore:
      - '*.md'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test_linux:
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@v6
    - name: Use Node.js 24.x
      uses: actions/setup-node@v6
      with:
        node-version: 24.x
    - name: Install build tools
      run: sudo apt-get install -y build-essential autoconf autoconf-archive automake libtool ninja-build
    - name: Restore vcpkg cache
      uses: actions/cache@v4
      with:
        path: ~/vcpkg
        key: vcpkg-${{ hashFiles('vcpkg.json') }}
        restore-keys: vcpkg-
    - name: Setup vcpkg
      run: |
        VCPKG_ROOT="$HOME/vcpkg"
        echo "VCPKG_ROOT=$VCPKG_ROOT" >> "$GITHUB_ENV"
        VCPKG_BASELINE=$(node -p "require('./vcpkg.json')['builtin-baseline']")
        if [ -d "$VCPKG_ROOT/.git" ]; then
          cd "$VCPKG_ROOT" && git fetch --quiet && git checkout "$VCPKG_BASELINE"
        else
          git clone --quiet https://github.com/microsoft/vcpkg.git "$VCPKG_ROOT"
          cd "$VCPKG_ROOT" && git checkout "$VCPKG_BASELINE"
        fi
        cd "$VCPKG_ROOT" && [ -f vcpkg ] || ./bootstrap-vcpkg.sh -disableMetrics
    - run: npm install --ignore-scripts
    - name: Build
      run: npx cmake-js compile -j max --CDCMAKE_TOOLCHAIN_FILE="$VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake"
    - name: Run tests
      run: npm test
      env:
        MOCHA_TEST_NETWORK: 1

  test_macos:
    runs-on: macos-15
    steps:
    - uses: actions/checkout@v6
    - name: Use Node.js 24.x
      uses: actions/setup-node@v6
      with:
        node-version: 24.x
    - name: Install build tools
      run: brew install autoconf automake libtool ninja
    - name: Restore vcpkg cache
      uses: actions/cache@v4
      with:
        path: ~/vcpkg
        key: vcpkg-${{ hashFiles('vcpkg.json') }}
        restore-keys: vcpkg-
    - name: Setup vcpkg
      run: |
        VCPKG_ROOT="$HOME/vcpkg"
        echo "VCPKG_ROOT=$VCPKG_ROOT" >> "$GITHUB_ENV"
        VCPKG_BASELINE=$(node -p "require('./vcpkg.json')['builtin-baseline']")
        if [ -d "$VCPKG_ROOT/.git" ]; then
          cd "$VCPKG_ROOT" && git fetch --quiet && git checkout "$VCPKG_BASELINE"
        else
          git clone --quiet https://github.com/microsoft/vcpkg.git "$VCPKG_ROOT"
          cd "$VCPKG_ROOT" && git checkout "$VCPKG_BASELINE"
        fi
        cd "$VCPKG_ROOT" && [ -f vcpkg ] || ./bootstrap-vcpkg.sh -disableMetrics
    - run: npm install --ignore-scripts
    - name: Build
      run: npx cmake-js compile -j max --CDCMAKE_TOOLCHAIN_FILE="$VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake"
    - name: Run tests
      run: npm test
      env:
        MOCHA_TEST_NETWORK: 1

  test_windows:
    runs-on: windows-2022
    steps:
    - uses: actions/checkout@v6
    - name: Use Node.js 24.x
      uses: actions/setup-node@v6
      with:
        node-version: 24.x
    - name: Install Ninja
      run: pip install ninja
    - name: Restore vcpkg cache
      uses: actions/cache@v4
      with:
        path: ~/vcpkg
        key: vcpkg-${{ hashFiles('vcpkg.json') }}
        restore-keys: vcpkg-
    - name: Setup vcpkg
      shell: pwsh
      run: |
        $VCPKG_ROOT = "$env:USERPROFILE\vcpkg"
        "VCPKG_ROOT=$VCPKG_ROOT" >> $env:GITHUB_ENV
        $VCPKG_BASELINE = (node -p "require('./vcpkg.json')['builtin-baseline']")
        if (Test-Path "$VCPKG_ROOT\.git") {
          cd $VCPKG_ROOT; git fetch --quiet; git checkout $VCPKG_BASELINE
        } else {
          git clone --quiet https://github.com/microsoft/vcpkg.git $VCPKG_ROOT
          cd $VCPKG_ROOT; git checkout $VCPKG_BASELINE
        }
        cd $VCPKG_ROOT
        if (!(Test-Path vcpkg.exe)) { .\bootstrap-vcpkg.bat -disableMetrics }
    - run: npm install --ignore-scripts
    - name: Build
      shell: pwsh
      run: npx cmake-js compile -j max --CDCMAKE_TOOLCHAIN_FILE="$env:VCPKG_ROOT\scripts\buildsystems\vcpkg.cmake"
    - name: Run tests
      run: npm test
      env:
        MOCHA_TEST_NETWORK: 1

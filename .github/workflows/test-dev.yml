name: Node.js CI

on:
  push:
    branches: [ main ]
    paths-ignore:
      - '*.md'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test_linux:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        linux-version: [ ubuntu:22.04, ubuntu:24.04, debian:bookworm, fedora:42 ]

    steps:
    - uses: actions/checkout@v6
    - name: Use Node.js 24.x
      uses: actions/setup-node@v6
      with:
        node-version: 24.x
    - name: ccache
      uses: hendrikmuhs/ccache-action@v1.2
      with:
        max-size: 1000M
        key: distros-${{ matrix.linux-version }}
    - run: npm run container dev ${{ matrix.linux-version }} 24 shared
      env:
        MOCHA_TEST_NETWORK: 1

  test_macos:
    runs-on: ${{ matrix.macos-version }}
    strategy:
      fail-fast: false
      matrix:
        macos-version: [ macos-14, macos-15 ]

    steps:
    - uses: actions/checkout@v6
    - name: Use Node.js 24.x
      uses: actions/setup-node@v6
      with:
        node-version: 24.x
    - uses: actions/setup-python@v6
      with:
        python-version: "3.11"
    - name: Restore Conan cache
      uses: actions/cache@v4
      with:
        path: ~/.conan2
        key: conan-${{ runner.os }}-${{ hashFiles('conanfile.py') }}
        restore-keys: conan-${{ runner.os }}-
    - name: Setup Conan
      run: |
        pip install conan
        conan profile detect
    - name: Install Conan dependencies
      run: conan install . -of=conan/install --build=missing
    - run: npm install --ignore-scripts
    - name: Build
      run: npx cmake-js compile -j max
      env:
        CMAKE_TOOLCHAIN_FILE: conan/install/conan_toolchain.cmake
    - name: Run unit tests
      run: npm test
      env:
        MOCHA_TEST_NETWORK: 1

  test_windows:
    runs-on: windows-2022

    steps:
    - uses: actions/checkout@v6
    - name: Use Node.js 24.x
      uses: actions/setup-node@v6
      with:
        node-version: 24.x
    - uses: actions/setup-python@v6
      with:
        python-version: "3.11"
    - name: Restore Conan cache
      uses: actions/cache@v4
      with:
        path: ~/.conan2
        key: conan-${{ runner.os }}-${{ hashFiles('conanfile.py') }}
        restore-keys: conan-${{ runner.os }}-
    - name: Setup Conan
      run: |
        pip install conan
        conan profile detect
    - name: Install Conan dependencies
      run: conan install . -of=conan/install --build=missing
    - run: npm install --ignore-scripts
    - name: Build
      run: npx cmake-js compile -j max
      env:
        CMAKE_TOOLCHAIN_FILE: conan/install/conan_toolchain.cmake
    - name: Run unit tests
      run: npm test
      env:
        MOCHA_TEST_NETWORK: 1

  coverage:
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v6
    - name: Use Node.js 24.x
      uses: actions/setup-node@v6
      with:
        node-version: 24.x
    - name: ccache
      uses: hendrikmuhs/ccache-action@v1.2
      with:
        max-size: 1000M
        key: coverage
    - name: Restore Conan cache
      uses: actions/cache@v4
      with:
        path: ~/.conan2
        key: conan-${{ runner.os }}-${{ hashFiles('conanfile.py') }}
        restore-keys: conan-${{ runner.os }}-
    - name: Setup Conan
      run: |
        pip install conan
        conan profile detect
    - name: Install Conan dependencies
      run: conan install . -of=conan/install --build=missing
    - run: npm install --ignore-scripts
    - name: Build
      run: npx cmake-js compile --debug --CDENABLE_COVERAGE=ON -j max
      env:
        CXX: ccache g++
        CC: ccache gcc
        CMAKE_TOOLCHAIN_FILE: conan/install/conan_toolchain.cmake
    - name: Run unit tests
      run: npx c8 npm test
      env:
        MOCHA_TEST_NETWORK: 1
    - name: Collect code coverage
      run: |
        npm run gcov
        npm run lcov
    - run: npm run codecov
      env:
        CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
